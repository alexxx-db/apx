name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.non-docs }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ''  # Forces git-based detection, bypasses GitHub API
          filters: |
            docs:
              - 'docs/**'
            non-docs:
              - '!docs/**'

  check:
    runs-on: linux-ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Cache Cargo dependencies aggressively
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # some tests are using `bun x tsc` to typecheck the code
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      # Build apx-agent binary (cached based on crate source files)
      - name: Cache apx-agent binary
        id: cache-agent
        uses: actions/cache@v5
        with:
          path: .bins/agent
          key: apx-agent-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('crates/agent/**', 'crates/common/**', 'Cargo.lock') }}

      - name: Build apx-agent
        if: steps.cache-agent.outputs.cache-hit != 'true'
        run: uv run --script scripts/build_agent.py --target x86_64-unknown-linux-gnu

      # Run checks
      - name: Cargo check
        run: cargo check --workspace --exclude apx-studio --all-targets

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --exclude apx-studio --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --exclude apx-studio

  docs:
    runs-on: linux-ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Docs check passed
        run: echo "✅ Documentation build successful"
